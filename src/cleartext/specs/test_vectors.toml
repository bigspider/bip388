confusion_score = 1
cleartext = [
    "Main path: spendable by @0",
    "@1 must sign",
    "@2 must sign",
]
has_cleartext = true

[[vector]]
template = "tr(@0/**,{sortedmulti_a(2,@1/**,@2/**),pk(@3/**)})"
confusion_score = 1
cleartext = [
    "Main path: spendable by @0",
    "@3 must sign",
    "Each of @1 and @2 must sign (sorted)",
]
has_cleartext = true

[[vector]]
